# 项目相关配置
chat:
  # 名称
  name: im-chat
  # 版本
  version: 1.0
  # 版权年份
  copyrightYear: 2023
  # 验证码类型 math 数组计算 char 字符验证
  captchaType: char


# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 9960
  servlet:
    # 应用的访问路径
    context-path: /chat
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.chat: debug
    org.springframework: warn
# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10
# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: @profiles.active@
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size:  10MB
      # 设置总上传的文件大小
      max-request-size:  20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
netty:
  websocket:
    port: 19080
    # URI路径
    path: /websocket
# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期单位分钟
  expireTime: 1440

# mybatis-plus 配置信息
mybatis-plus:
  type-aliases-package: com.chat.**.domain
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  configuration:
    cache-enabled: true
    use-generated-keys: true
    default-executor-type: simple
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 不验证的URL
security:
  ignore:
    url:
      - /login
      - /register/**
      - /captchaImage
      - /chat/visitor/**
      - /chat/user/homeUserNotice
      - /sms/login
      - /sms/register
      - /upload/**
      - /profile/**
      - /channel/wx/**
      - /channel/weChat/authJump
      - /channel/wxmp/authJump
      - /channel/tiktok/authJump
      - /weChat/customer/notify/**
      - /weChat/notify/**
      - /tiktok/notify/**
      - /pay/ali/notify
      - /pay/wx/notify

